html<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
  }
  .video-container {
    position: relative;
    width: 100%;
    height: 100%;
  }
  iframe {
    position: absolute;
    width: 100%;
    height: 100%;
    border: none;
  }
.top-cover {
    position: absolute;
    top: 0;
    right: 0;
    width: 80px;   /* just enough for the top-right Drive buttons */
    height: 50px;  /* shorter height */
    background: black;
    z-index: 10;
}
</style>
</head>
<body>
<div class="video-container">
  <iframe 
    src="https://drive.google.com/file/d/199PONVkupiZX0IhkdPdxBIBbYtDMlBQw/preview"
    allow="autoplay; fullscreen"
    allowfullscreen>
  </iframe>
  <div class="top-cover"></div>
</div>
</body>
</html>
