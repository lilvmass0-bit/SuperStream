<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen Video with Overlay</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: black;
  }

  iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    z-index: 1;
  }
</style>
</head>
<body>

<iframe src="https://drive.google.com/file/d/199PONVkupiZX0IhkdPdxBIBbYtDMlBQw/preview" allowfullscreen></iframe>

</body>
</html>
